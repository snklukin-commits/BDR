<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>БДР Money</title>
  <style>
    :root{--bg:#f6f7f9;--ink:#111827;--muted:#6b7280;--panel:#fff;--line:#e5e7eb;--black:#111827;--green:#047857;--red:#b42318;--shadow:0 16px 40px rgba(17,24,39,.08);--radius:8px}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Arial,sans-serif}body{background:linear-gradient(180deg,#fbfcfe 0,#f6f7f9 280px,#f6f7f9 100%)}button,input,select,textarea{font:inherit}button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:10px 13px;font-weight:800;color:var(--ink);cursor:pointer}button.primary,.tab.active{background:var(--black);border-color:var(--black);color:#fff}button.danger{background:#fff5f5;border-color:#ffd6d6;color:var(--red)}input,select,textarea{border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);padding:10px 11px;max-width:100%}.app{max-width:1220px;margin:0 auto;padding:18px 18px 96px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px}.brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:22px;letter-spacing:-.03em}.brand-mark,.avatar{width:36px;height:36px;border-radius:8px;background:#111827;color:#fff;display:grid;place-items:center;font-size:13px;font-weight:900}.brand small{display:block;color:var(--muted);font-size:12px;font-weight:650;letter-spacing:0;margin-top:2px}.tabs{position:sticky;top:10px;z-index:20;display:flex;gap:8px;overflow:auto;padding:6px;margin-bottom:18px;background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 24px rgba(17,24,39,.06);backdrop-filter:blur(16px)}.tab{white-space:nowrap;box-shadow:none}.section{display:none}.section.active{display:block}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.card{background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}.hero{background:#111827;color:#fff;border-radius:8px;padding:20px;box-shadow:var(--shadow);margin-bottom:14px}.hero:after{display:none}.hero-value{font-size:42px;line-height:1.05;font-weight:930;letter-spacing:-.04em;margin:8px 0 12px}.chip{display:inline-flex;padding:6px 9px;border-radius:999px;background:#eef2f7;color:#374151;font-size:12px;font-weight:760;margin:0 6px 6px 0}.hero .chip{background:rgba(255,255,255,.12);color:#fff}.kpi-title,h3{margin:0 0 8px;color:var(--muted);font-size:11px;font-weight:850;text-transform:uppercase;letter-spacing:.07em}.value{font-size:27px;line-height:1.1;font-weight:910;letter-spacing:-.04em}.muted{color:var(--muted)}.small{font-size:12px}.good{color:var(--green)}.bad{color:var(--red)}.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}.scroll{overflow:auto;max-height:680px;border-radius:8px;border:1px solid var(--line)}table{width:100%;border-collapse:separate;border-spacing:0;background:#fff}th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;font-size:13px;vertical-align:top}th{position:sticky;top:0;background:#f9fafb;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em}.empty{padding:18px;border:1px dashed #cfd5df;border-radius:8px;background:#fff;color:var(--muted)}.bar{height:8px;border-radius:999px;background:#eef1f5;overflow:hidden}.bar span{display:block;height:100%;border-radius:999px}.drop{border:1px dashed #b8c0cc;background:#fff;border-radius:8px;padding:18px;text-align:center}@media(max-width:900px){.grid,.grid2{grid-template-columns:1fr 1fr}}@media(max-width:640px){.app{padding:12px 10px 86px}.grid,.grid2{grid-template-columns:1fr}.tabs{position:fixed;left:10px;right:10px;bottom:10px;top:auto;margin:0}.tab{font-size:12px;min-width:auto;padding:10px}.hero-value{font-size:34px}.toolbar>*{width:100%;flex:1 1 100%}}
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar"><div class="brand"><span class="brand-mark">БДР</span><span>Money<small>личный финансовый центр</small></span></div><div class="avatar">С</div></div>
    <div class="tabs"><button class="tab active" data-tab="dashboard">Обзор</button><button class="tab" data-tab="current">Текущий месяц</button><button class="tab" data-tab="operations">Операции</button><button class="tab" data-tab="credits">Кредиты</button><button class="tab" data-tab="manage">Импорт и правила</button></div>
    <section id="dashboard" class="section active"></section><section id="current" class="section"></section><section id="operations" class="section"></section><section id="credits" class="section"></section><section id="manage" class="section"></section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="config.js"></script><script src="rules.js"></script><script src="operations.js"></script><script src="app.js"></script><script src="credits.js"></script><script src="polish.js"></script>
</body>
</html>
