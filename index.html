<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>БДР Money App</title>
  <style>
    :root{--bg:#f5f6fa;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--dark:#111827;--good:#047857;--bad:#b91c1c;--warn:#b45309;--blue:#1d4ed8}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif} header{padding:24px;background:var(--dark);color:#fff} h1{margin:0 0 8px;font-size:28px} h2{margin:0 0 14px} h3{margin:0 0 10px;color:var(--muted);font-size:14px;font-weight:500} p{line-height:1.45} main{max-width:1380px;margin:auto;padding:18px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 16px}.tab,button{border:1px solid var(--line);background:#fff;padding:10px 14px;border-radius:12px;cursor:pointer}.tab.active,button.primary{background:var(--dark);color:#fff}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 8px 24px rgba(15,23,42,.04);margin-bottom:14px}.value{font-size:24px;font-weight:700}.section{display:none}.section.active{display:block}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px} input,select,textarea{padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:#fff;font:inherit} textarea{width:100%;min-height:130px} table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden} th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;font-size:14px;vertical-align:top} th{background:#f3f4f6;color:#374151}.good{color:var(--good)}.bad{color:var(--bad)}.warn{color:var(--warn)}.muted{color:var(--muted)}.pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px}.drop{border:2px dashed #cbd5e1;background:#fff;border-radius:18px;padding:22px;text-align:center}.drop.drag{border-color:#111827;background:#f8fafc}.empty{padding:18px;border:1px dashed #cbd5e1;border-radius:14px;background:#fff;color:#475569}.scroll{overflow:auto;max-height:620px}.small{font-size:12px}.danger{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}@media(max-width:560px){.grid{grid-template-columns:1fr}th,td{font-size:12px}}
  </style>
</head>
<body>
<header><h1>БДР Money App</h1><p>Личный БДР: импорт банковских XLSX, логика доходов/расходов, лимиты, текущий месяц, кредиты и ипотека.</p></header>
<main>
  <div class="tabs">
    <button class="tab active" data-tab="dashboard">Дашборд</button>
    <button class="tab" data-tab="current">Текущий месяц</button>
    <button class="tab" data-tab="operations">Операции</button>
    <button class="tab" data-tab="credits">Кредиты</button>
    <button class="tab" data-tab="manage">Управление</button>
  </div>
  <section id="dashboard" class="section active"></section>
  <section id="current" class="section"></section>
  <section id="operations" class="section"></section>
  <section id="credits" class="section"></section>
  <section id="manage" class="section"></section>
</main>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="rules.js"></script>
<script src="operations.js"></script>
<script src="app.js"></script>
</body>
</html>
