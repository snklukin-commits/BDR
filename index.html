<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>БДР Money App</title>
  <style>
    :root{
      --bg:#f4f1eb;--ink:#171717;--muted:#7a746b;--card:#fffaf2;--card2:#ffffff;
      --line:rgba(23,23,23,.08);--black:#111111;--gold:#c8a96a;--green:#087f5b;--red:#b42318;--blue:#2454ff;
      --shadow:0 20px 60px rgba(24,20,15,.12);--radius:28px;
    }
    *{box-sizing:border-box} html{background:var(--bg)} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 20% -10%,#fff8dc 0,#f7f2e8 36%,#f4f1eb 100%);min-height:100vh}
    .app{max-width:1180px;margin:0 auto;padding:18px 18px 96px}.topbar{display:flex;align-items:center;justify-content:space-between;margin:4px 0 16px}.brand{font-weight:900;letter-spacing:-.05em;font-size:24px}.brand small{display:block;font-weight:600;color:var(--muted);letter-spacing:0;font-size:12px;margin-top:3px}.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#111,#3c3428);color:#fff;display:grid;place-items:center;font-weight:800}
    .tabs{position:sticky;top:10px;z-index:20;display:flex;gap:8px;overflow:auto;padding:8px;margin:0 0 16px;background:rgba(255,250,242,.72);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.8);border-radius:24px;box-shadow:0 10px 35px rgba(24,20,15,.08)}
    .tab,button{border:0;background:#fff;border-radius:999px;padding:11px 15px;font-weight:800;color:#302b25;cursor:pointer;white-space:nowrap;box-shadow:inset 0 0 0 1px var(--line)}.tab.active,button.primary{background:#111;color:#fff;box-shadow:0 10px 25px rgba(17,17,17,.18)}button.danger{background:#fee4e2;color:#912018}.section{display:none}.section.active{display:block}
    .hero{position:relative;overflow:hidden;border-radius:34px;padding:24px;background:linear-gradient(135deg,#17130d,#3b3022 52%,#b79555);color:#fff;box-shadow:var(--shadow);margin-bottom:16px}.hero:after{content:"";position:absolute;right:-60px;top:-80px;width:230px;height:230px;border-radius:50%;background:rgba(255,255,255,.12)}.hero-label{font-size:13px;color:rgba(255,255,255,.72);font-weight:700;text-transform:uppercase;letter-spacing:.08em}.hero-value{font-size:44px;line-height:1;font-weight:950;letter-spacing:-.07em;margin:10px 0}.hero-sub{display:flex;gap:10px;flex-wrap:wrap}.chip{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.14);color:inherit;font-size:12px;font-weight:800}.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:#f0eadf;color:#5e5447;font-size:12px;font-weight:800}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:rgba(255,250,242,.92);border:1px solid rgba(255,255,255,.92);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px}.card.white{background:#fff}.kpi-title,h3{margin:0 0 9px;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.value{font-size:28px;font-weight:950;letter-spacing:-.06em}.muted{color:var(--muted)}.good{color:var(--green)}.bad{color:var(--red)}.warn{color:#b54708}.ai{background:linear-gradient(135deg,#fffaf2,#eef4ff);border-color:#dbe7ff}.drop{border:2px dashed rgba(23,23,23,.18);background:#fff;border-radius:24px;padding:22px;text-align:center}.drop.drag{border-color:#111;background:#fff7dd}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}input,select,textarea{width:auto;max-width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:16px;background:#fff;font:inherit;color:var(--ink)}textarea{width:100%;min-height:130px}.scroll{overflow:auto;max-height:620px;border-radius:18px}table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;overflow:hidden}th,td{border-bottom:1px solid var(--line);padding:11px;text-align:left;font-size:14px;vertical-align:top}th{background:#faf7f0;color:#7a746b;font-size:11px;text-transform:uppercase;letter-spacing:.08em}.empty{padding:18px;border:1px dashed rgba(23,23,23,.16);border-radius:20px;background:#fff;color:var(--muted)}.bar{height:10px;background:#eee6d8;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,#111,#c8a96a);border-radius:999px}.donut{width:168px;height:168px;border-radius:50%;background:conic-gradient(#111 0 42%,#c8a96a 42% 66%,#6d5b3f 66% 82%,#e8dcc6 82% 100%);display:grid;place-items:center;margin:auto}.donut:before{content:"";width:104px;height:104px;background:#fffaf2;border-radius:50%;box-shadow:inset 0 0 0 1px var(--line)}.bank-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.bank-card{background:#fff;border-radius:24px;padding:16px;box-shadow:0 12px 32px rgba(24,20,15,.08);border:1px solid var(--line)}.bank-name{font-size:18px;font-weight:950}.small{font-size:12px}.rule-card{background:#fff;border-radius:22px;border:1px solid var(--line);padding:14px;margin:10px 0}
    [data-list-cat] .scroll{max-height:none!important;margin-top:12px!important;border-radius:16px!important;background:transparent!important;overflow:visible!important}
    [data-list-cat] .scroll table{display:block!important;background:transparent!important;border:0!important}
    [data-list-cat] .scroll thead{display:none!important}
    [data-list-cat] .scroll tbody{display:grid!important;gap:8px!important}
    [data-list-cat] .scroll tr{display:grid!important;grid-template-columns:58px minmax(0,1fr) auto!important;gap:9px!important;align-items:center!important;padding:10px!important;border-radius:16px!important;background:rgba(255,255,255,.09)!important;color:#fff!important;border:0!important}
    [data-list-cat] .scroll td{display:block!important;border:0!important;padding:0!important;color:inherit!important;font-size:13px!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;min-width:0!important;background:transparent!important}
    [data-list-cat] .scroll td:first-child{color:rgba(255,255,255,.66)!important;font-size:12px!important}
    [data-list-cat] .scroll td:last-child{font-weight:900!important;text-align:right!important;color:#fff!important}
    [data-list-cat] .scroll tr:has(td:empty) {display:none!important}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.grid2,.bank-grid{grid-template-columns:1fr}.hero-value{font-size:38px}}
    @media(max-width:620px){.app{padding:14px 12px 92px}.topbar{padding:2px 4px}.brand{font-size:22px}.tabs{position:fixed;left:10px;right:10px;bottom:10px;top:auto;margin:0;justify-content:space-between;border-radius:26px;padding:8px}.tab{font-size:0;padding:12px;min-width:54px}.tab:before{font-size:20px}.tab[data-tab="dashboard"]:before{content:"⌂"}.tab[data-tab="current"]:before{content:"◷"}.tab[data-tab="operations"]:before{content:"≡"}.tab[data-tab="credits"]:before{content:"₽"}.tab[data-tab="manage"]:before{content:"⚙"}.hero{border-radius:30px;padding:22px}.hero-value{font-size:34px}.grid{grid-template-columns:1fr 1fr;gap:10px}.card{border-radius:24px;padding:15px}.value{font-size:23px}input,select,button{width:100%}.toolbar>*{flex:1 1 100%}th,td{font-size:12px;padding:9px}.donut{width:144px;height:144px}.donut:before{width:88px;height:88px}}
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar"><div class="brand">БДР Money<small>личный финансовый центр</small></div><div class="avatar">С</div></div>
    <div class="tabs">
      <button class="tab active" data-tab="dashboard">Дашборд</button>
      <button class="tab" data-tab="current">Текущий месяц</button>
      <button class="tab" data-tab="operations">Операции</button>
      <button class="tab" data-tab="credits">Кредиты</button>
      <button class="tab" data-tab="manage">Управление</button>
    </div>
    <section id="dashboard" class="section active"></section>
    <section id="current" class="section"></section>
    <section id="operations" class="section"></section>
    <section id="credits" class="section"></section>
    <section id="manage" class="section"></section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="config.js"></script>
  <script src="rules.js"></script>
  <script src="operations.js"></script>
  <script src="app.js"></script>
</body>
</html>
