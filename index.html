<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>БДР Money App</title>
  <style>
    :root{--bg:#f3f5f8;--card:rgba(255,255,255,.92);--text:#111827;--muted:#64748b;--line:#e5e7eb;--dark:#0f172a;--dark2:#1e293b;--good:#047857;--bad:#b91c1c;--warn:#b45309;--blue:#2563eb;--violet:#7c3aed;--shadow:0 18px 45px rgba(15,23,42,.08)}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 20% 0%,#e0e7ff 0,#f8fafc 32%,#f3f5f8 100%);color:var(--text);font-family:Inter,Arial,sans-serif} header{padding:28px 22px;background:linear-gradient(135deg,#0f172a,#1e293b 48%,#312e81);color:#fff;border-bottom:1px solid rgba(255,255,255,.12)} h1{margin:0 0 8px;font-size:30px;letter-spacing:-.04em} h2{margin:0 0 14px;letter-spacing:-.03em} h3{margin:0 0 10px;color:var(--muted);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.05em} p{line-height:1.45} main{max-width:1440px;margin:auto;padding:18px}.tabs{position:sticky;top:0;z-index:10;display:flex;gap:8px;flex-wrap:wrap;margin:0 0 16px;padding:10px;background:rgba(243,245,248,.86);backdrop-filter:blur(12px);border:1px solid rgba(226,232,240,.75);border-radius:20px}.tab,button{border:1px solid var(--line);background:#fff;padding:10px 14px;border-radius:14px;cursor:pointer;font-weight:600}.tab.active,button.primary{background:linear-gradient(135deg,var(--dark),#334155);color:#fff;border-color:transparent}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:var(--card);border:1px solid rgba(226,232,240,.9);border-radius:24px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px;backdrop-filter:blur(10px)}.value{font-size:28px;font-weight:800;letter-spacing:-.04em}.section{display:none}.section.active{display:block}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px} input,select,textarea{padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#fff;font:inherit} textarea{width:100%;min-height:130px} table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:16px;overflow:hidden} th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;font-size:14px;vertical-align:top} th{background:#f8fafc;color:#475569;font-size:12px;text-transform:uppercase;letter-spacing:.04em}.good{color:var(--good)}.bad{color:var(--bad)}.warn{color:var(--warn)}.muted{color:var(--muted)}.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:700}.drop{border:2px dashed #cbd5e1;background:linear-gradient(180deg,#fff,#f8fafc);border-radius:22px;padding:24px;text-align:center}.drop.drag{border-color:#111827;background:#eef2ff}.empty{padding:18px;border:1px dashed #cbd5e1;border-radius:16px;background:#fff;color:#475569}.scroll{overflow:auto;max-height:620px}.small{font-size:12px}.danger{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}.ai{background:linear-gradient(135deg,#eff6ff,#f5f3ff);border:1px solid #dbeafe}.rule-card{border:1px solid var(--line);border-radius:18px;padding:12px;margin:8px 0;background:#fff}.bank-card{background:#fff;border:1px solid #e2e8f0;border-radius:22px;padding:16px;box-shadow:0 10px 30px rgba(15,23,42,.05)}.bank-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}.bank-name{font-size:18px;font-weight:800}.bank-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.status-wait{background:#fef3c7;color:#92400e}.status-file{background:#dbeafe;color:#1e40af}.status-api{background:#dcfce7;color:#166534}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}.bank-grid{grid-template-columns:1fr}}@media(max-width:560px){main{padding:10px}.grid{grid-template-columns:1fr}th,td{font-size:12px}.tabs{position:static}.value{font-size:24px}}
  </style>
</head>
<body>
<header><h1>БДР Money App</h1><p>Личный финансовый менеджер: импорт банковских XLSX, управляемые правила, лимиты, текущий месяц, кредиты и ипотека.</p></header>
<main>
  <div class="tabs">
    <button class="tab active" data-tab="dashboard">Дашборд</button>
    <button class="tab" data-tab="current">Текущий месяц</button>
    <button class="tab" data-tab="operations">Операции</button>
    <button class="tab" data-tab="credits">Кредиты</button>
    <button class="tab" data-tab="manage">Управление</button>
  </div>
  <section id="dashboard" class="section active"></section>
  <section id="current" class="section"></section>
  <section id="operations" class="section"></section>
  <section id="credits" class="section"></section>
  <section id="manage" class="section"></section>
</main>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="rules.js"></script>
<script src="operations.js"></script>
<script src="app.js"></script>
<script src="bank-connections.js"></script>
</body>
</html>
